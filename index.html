<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Grade</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4f46e5">
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #f0f2f5;
    }
    .card {
      background: #fff;
      padding: 30px 20px;
      border-radius: 12px;
      width: 320px;
      text-align: center;
      box-shadow: 0 6px 18px rgba(0,0,0,0.1);
    }
    h2 {
      margin-bottom: 20px;
      font-weight: 600;
    }
    input, button {
      width: 100%;
      padding: 14px;       /* FIXED padding */
      margin: 10px 0;      /* FIXED margin */
      border-radius: 8px;  /* Rounded corners */
      border: 1px solid #ccc;
      font-size: 1rem;
      box-sizing: border-box;
    }
    button {
      background: red;
      color: #fff;
      border: none;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background: darkred;
    }
    #result {
      margin-top: 15px;
      font-weight: 500;
      color: #333;
      text-align: left;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>Student Grade</h2>
  <input id="student" type="text" placeholder="Student Name">
  <input id="teacher" type="text" placeholder="Teacher Name">
  <input id="grade" type="number" placeholder="Grade">
  <button type="button" onclick="checkGrade()">Check</button>
  <button type="button" onclick="clearAll()">Clear</button>
  <div id="result"></div>
</div>

<script>
function checkGrade() {
  var student = document.getElementById('student').value;
  var teacher = document.getElementById('teacher').value;
  var grade = document.getElementById('grade').value;

  if (student === "" || teacher === "" || grade === "") {
    document.getElementById('result').innerHTML = "Fill in all fields!";
    return;
  }

  var remark = (parseFloat(grade) >= 75) ? "Passed" : "Failed";

  document.getElementById('result').innerHTML =
    "Student: " + student + "<br>" +
    "Teacher: " + teacher + "<br>" +
    "Grade: " + grade + "<br>" +
    "Remarks: " + remark;
}

function clearAll() {
  document.getElementById('student').value = "";
  document.getElementById('teacher').value = "";
  document.getElementById('grade').value = "";
  document.getElementById('result').innerHTML = "";
}
</script>

</body>
</html>
