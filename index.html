<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Grade</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4f46e5">

  <style>
    body { font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .card { background: #fff; padding: 20px; border-radius: 10px; width: 300px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1);}
    input, button { width: 100%; padding: 10px; margin: 6px 0; font-size: 1rem; }
    button { background: red; color: #fff; border: none; cursor: pointer; }
    button:hover { background: darkred; }
    #result { margin-top: 10px; text-align: left; }
  </style>
</head>
<body>

<div class="card">
  <h2>Student Grade</h2>
  <input id="student" type="text" placeholder="Student Name">
  <input id="teacher" type="text" placeholder="Teacher Name">
  <input id="grade" type="number" placeholder="Grade">
  <button type="button" onclick="checkGrade()">Check</button>
  <button type="button" onclick="clearAll()">Clear</button>
  <div id="result"></div>
</div>

<script>
function checkGrade() {
  var student = document.getElementById('student').value;
  var teacher = document.getElementById('teacher').value;
  var grade = document.getElementById('grade').value;

  if (student === "" || teacher === "" || grade === "") {
    document.getElementById('result').innerHTML = "Fill in all fields!";
    return;
  }

  var remark = (parseFloat(grade) >= 75) ? "Passed" : "Failed";

  document.getElementById('result').innerHTML =
    "Student: " + student + "<br>" +
    "Teacher: " + teacher + "<br>" +
    "Grade: " + grade + "<br>" +
    "Remarks: " + remark;
}

function clearAll() {
  document.getElementById('student').value = "";
  document.getElementById('teacher').value = "";
  document.getElementById('grade').value = "";
  document.getElementById('result').innerHTML = "";
}
</script>

</body>
</html>
